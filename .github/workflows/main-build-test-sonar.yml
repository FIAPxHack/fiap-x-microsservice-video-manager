name: "[Etapa 2] Main - Build, Test & SonarCloud Analysis"

on:
  push:
    branches:
      - main

jobs:
  build-test-and-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"FIAPxHack_fiap-x-microsservice-video-manager" \
            /o:"fiapxhack" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/tests/**/*" \
            /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.dll,**/*.exe,**/Migrations/**"

      - name: Build for Analysis
        run: dotnet build VideoManagerService.sln --configuration Release --no-incremental
      
      - name: Run Tests with Coverage
        run: |
          dotnet test VideoManagerService.sln \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings coverlet.runsettings
      
      - name: Debug Coverage Files
        run: |
          echo "=== Locating coverage files ==="
          find ./TestResults -name "coverage.opencover.xml" -type f
          echo "=== Checking file paths inside report ==="
          head -20 $(find ./TestResults -name "coverage.opencover.xml" -type f | head -1)

      - name: End SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/TestResults/**/coverage.opencover.xml'
          retention-days: 30
