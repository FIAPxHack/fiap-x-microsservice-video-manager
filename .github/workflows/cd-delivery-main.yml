name: "[Etapa 4] Continuous Delivery - Docker"

on:
  workflow_run:
    workflows: ["[Etapa 2] Main - Build, Test & SonarCloud Analysis"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  docker-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir e publicar imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fiap-x-video-manager:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fiap-x-video-manager:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fiap-x-video-manager:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fiap-x-video-manager:buildcache,mode=max
